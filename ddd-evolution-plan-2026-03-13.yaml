enhancements:
  - id: "EN-001"
    shortfall: "llm_call node cannot reference external prompt template files — changes to prompt files are invisible to DDD drift detection"
    verdict: ENHANCEMENT
    source_entries:
      - "inadequate_existing_nodes[0]: llm_call (content/generate-drafts, content/compose-report-article, content/compose-apply-style, publishing/regenerate-pipe-item-draft)"
    evidence:
      frequency: 1
      projects: ["content-curator"]
      max_severity: medium
      consistent_severity: true
      specificity: specific
      workaround_quality: lossy_workaround
    analysis: |
      The llm_call node has system_prompt and prompt_template as inline strings,
      but real-world LLM integrations often use external prompt files (system prompts,
      template files with variable interpolation, guardrail instructions). When these
      files change, DDD has no visibility — /ddd-sync won't detect drift, /ddd-status
      shows nothing, and no change-history entry is written. In content-curator, a CTA
      wording bug ("analysis in comments") was caused by a prompt file change that was
      completely invisible to DDD tracking.

      Current workaround is to not track prompt files at all, which means behavioral
      changes to LLM outputs go undetected. custom_fields could store paths but
      /ddd-sync wouldn't hash those files, so the tracking value is lost.

      Classified as ENHANCEMENT (not REAL_GAP) because only one project has reported
      this so far. LLM-heavy projects commonly use external prompt files, so this is
      likely generalizable — a second occurrence would promote it to REAL_GAP.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add optional prompt_files field (string[]) to llm_call node spec — array
              of relative file paths that contribute to the final prompt. /ddd-sync
              should hash referenced files alongside spec YAML for drift detection.
              /ddd-implement should read these files for context when generating LLM
              integration code."
      affects:
        spec: true       # DDD-USAGE-GUIDE.md — llm_call node table
        commands: true    # ddd-create.md (llm_call instructions), ddd-sync.md (hash prompt files)
        tool: true        # DDD Tool — llm_call node editor
        validator: false  # No validation needed — optional field, any file path is valid
      effort: small
      risk: low
      breaking: false
    decision: approve

