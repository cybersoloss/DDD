# ──────────────────────────────────────────────
# TIER 1: Real gaps — recommended for action
# These are genuine DDD framework limitations
# ──────────────────────────────────────────────
real_gaps:
  - id: "RG-001"
    shortfall: "Add per-agent model_override to orchestrator agents[] array"
    verdict: REAL_GAP
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: high
      specificity: specific
      workaround_quality: lossy_workaround
      consistent_severity: true
    analysis: |
      The orchestrator node's `agents[]` array (OrchestratorAgent type) has id,
      flow, specialization, and priority — but no model field. The orchestrator's
      own `model` field sets the supervisor/coordinator model, leaving each agent
      sub-flow to use whatever model its internal llm_call nodes declare. There
      is no way to say "run agent A with claude-opus-4-6 and agent B with gpt-4o"
      from the orchestrator level. The AI consensus review pattern — where different
      models provide independent perspectives to reduce confirmation bias — is a
      documented use case for orchestrator.consensus strategy and cannot be expressed
      cleanly without this field. The workaround is to create duplicate sub-flows
      that differ only in their llm_call model, which defeats the purpose of
      flow_ref reuse.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add optional `model_override: string` to OrchestratorAgent type. When set, overrides the model used by llm_call nodes inside the referenced sub-flow for this orchestrator invocation. /ddd-implement passes model_override as a runtime parameter to the sub-flow executor."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: medium
      risk: low
      breaking: false
    decision: approve

  - id: "RG-002"
    shortfall: "Add model_fallback chain to llm_call for multi-model resilience"
    verdict: REAL_GAP
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: high
      specificity: specific
      workaround_quality: lossy_workaround
      consistent_severity: true
    analysis: |
      llm_call has a `retry` field for retrying the same model, but no way to
      declare fallback to a different model when the primary is unavailable.
      Rate-limit (429) and overload (503) errors are common with frontier models
      in production-scale AI applications. The current workaround requires a
      decision node to check the error code, then a second llm_call node with
      the fallback model — which doubles node count per fallback tier and makes
      the fallback intent invisible unless you inspect the error routing carefully.
      Nexus has 3+ flows affected (classify-content, score-quality, fact-check-agent).
      AI-intensive projects uniformly encounter this pattern; while nexus-e2e is
      a single project, model fallback is a fundamental operational concern for
      any LLM-heavy application and warrants REAL_GAP classification. The shortfall
      also identifies this as the top recommendation.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add `model_fallback: [{ model: string, on_error: string[] }]` to llm_call spec. `on_error` values: 'rate_limited' (429), 'overloaded' (503), 'timeout', 'any'. When the primary model hits a listed error, /ddd-implement retries with the fallback model before routing to error terminal."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: medium
      risk: low
      breaking: false
    decision: approve

  - id: "RG-003"
    shortfall: "Add kanban-board UI component type"
    verdict: REAL_GAP
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: high
      specificity: specific
      workaround_quality: lossy_workaround
      consistent_severity: true
    analysis: |
      Kanban boards (columns of cards representing workflow stages with drag-between-
      column interaction) are a fundamental workflow visualization pattern used across
      editorial, project management, support ticket, and task management applications.
      The current workaround — item-list with filter-bar for status filtering — loses
      the core value of the kanban pattern: seeing all workflow stages simultaneously
      and drag-to-transition. The editorial-queue use case is canonical and will
      recur across content management, customer support, and task management DDD
      projects. Classified as REAL_GAP because the workaround loses information
      (no stage overview, no drag interaction) and the component is broadly applicable.
      Notably, the feature_coverage shows ui_component_types: 11/14 — kanban-board
      is one of the 3 missing component types along with calendar-view and one other.
    recommendation:
      action: ADD_FIELD
      pillar: interface
      scope: "Add `kanban-board` to UI component type enum with fields: data_source, columns ([{id, label, status_value, max_items?, color?}]), item_template (card fields: title, subtitle, badge, assignee, priority, date), item_actions, on_move_flow (called when card moves columns), empty_state. /ddd-implement generates a drag-and-drop board component with optimistic updates."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: large
      risk: low
      breaking: false
    decision: approve

