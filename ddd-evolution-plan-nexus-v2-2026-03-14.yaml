enhancements:
  - id: "EN-001"
    shortfall: "Add retry_config to connection behavior:retry for configurable backoff"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: high
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      connection `behavior: retry` is documented as "retry count configured at node
      level" — but most node types don't have retry fields. service_call and llm_call
      both have `retry: { max_attempts, backoff_ms, strategy, jitter }` on the node,
      so those cases are addressed. The gap is for other node types (e.g., data_store,
      parse) where retry config must live somewhere. The connection behavior:retry tag
      exists as a semantic marker but cannot be configured. Classified as ENHANCEMENT
      (not REAL_GAP) because the service_call and llm_call cases — the most common
      retry use cases — are already solved at the node level. The workaround for other
      nodes (delay+loop) is lossy but functional.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add `retry_config: { max_attempts?, initial_delay_ms?, backoff_factor?, jitter?: boolean }` to connection spec, active when `behavior: retry`. /ddd-implement generates retry wrapper for the edge using this config."
      affects:
        spec: true
        commands: true
        tool: false
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-002"
    shortfall: "Add cors_config field to HTTP trigger for self-describing CORS policy"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: medium
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      HTTP triggers have no CORS configuration field. Origins, methods, headers,
      and credentials must be configured in generated middleware outside of specs.
      This breaks the DDD principle that specs are self-describing — a reviewer
      cannot determine CORS policy from the flow spec alone. The workaround
      (middleware config) is adequate but creates a spec/code divergence. A
      cors_config field would make each endpoint's CORS policy explicit and
      allow /ddd-implement to generate CORS middleware from spec.
    recommendation:
      action: ADD_FIELD
      pillar: cross_cutting
      scope: "Add `cors_config: { origins: string[], methods?: string[], headers?: string[], credentials?: boolean }` to HTTP trigger spec. /ddd-implement generates CORS middleware from this config."
      affects:
        spec: true
        commands: true
        tool: false
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-003"
    shortfall: "Add schema_ref to event node for node-level payload schema enforcement"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: medium
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      An `event` node emitting a domain event has no way to declare which schema
      its payload must conform to. The payload shape lives in domain.yaml
      publishes_events[].payload, with no validation at the node level. While
      domain.yaml already captures this, adding schema_ref on the event node
      would enable /ddd-implement to generate payload validation before emit and
      make the schema reference visible on the L3 canvas. The workaround (domain.yaml
      documentation) is adequate for spec authoring but misses runtime validation.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add `schema_ref: string` to event node spec (e.g., 'ContentItem'). /ddd-implement validates the event payload against the referenced schema before emit. DDD Tool shows schema name on the event node."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-004"
    shortfall: "Add async:true to connections for inline fire-and-forget without queue dependency"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: medium
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      Emitting a side-effect asynchronously (e.g., recording an analytics event while
      returning the API response) currently requires an `event` node with `target_queue`,
      introducing a queue dependency for what can be a simple background call. The
      `async: true` connection flag would make the target node execute in a background
      job without blocking the source node's response path. The event+queue workaround
      is adequate but overly heavyweight for simple fire-and-forget patterns. The
      connection-level `async` flag has no equivalents in the current spec, making
      this a genuine additive improvement.
    recommendation:
      action: ADD_FIELD
      pillar: cross_cutting
      scope: "Add `async: boolean` to connection spec. When true, /ddd-implement wraps the target node's invocation in setImmediate/Promise.resolve().then() — fire-and-forget, no await. The source flow continues immediately without blocking on the target."
      affects:
        spec: true
        commands: true
        tool: false
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-005"
    shortfall: "Add rate_limit_policy at domain.yaml and system.yaml level"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: medium
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      Per-endpoint rate limiting via trigger.rate_limit requires repeating the same
      policy on every HTTP trigger. Nexus has 30+ HTTP-triggered flows — each needs
      per-user-tier rate limits (free: 100 req/min, pro: 1000 req/min). This is
      a more comprehensive version of EN-002 from the nexus v1 evolution plan (which
      addressed trigger-level cross_cutting_patterns). The v2 shortfall clarifies
      the inheritance hierarchy: system.yaml global default → domain.yaml override
      → trigger-level override. This layered approach better matches how rate limits
      are configured in practice and eliminates duplication on large projects.
    recommendation:
      action: ADD_FIELD
      pillar: cross_cutting
      scope: "Add `rate_limit_policy: { window_ms, max_requests, key_by, tiers?: [{ name, max_requests, key_by }] }` to domain.yaml (applies to all HTTP triggers in domain) and system.yaml (global default). Trigger-level rate_limit overrides domain default. /ddd-implement generates tiered rate limiting middleware."
      affects:
        spec: true
        commands: true
        tool: false
        validator: false
      effort: medium
      risk: low
      breaking: false
    decision: approve

  - id: "EN-006"
    shortfall: "Add audit:true metadata flag to domain.yaml and flow metadata"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: medium
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      Nexus has ~35 mutating flows that each need audit logging. The current
      cross_cutting_patterns audit_log pattern (added in nexus v1 EN-003) requires
      manual event emit nodes in every mutating flow; forgetting one silently omits
      audit data. The shortfall proposes a structural flag: `audit: true` on
      domain.yaml or flow metadata. When set, /ddd-implement automatically wraps
      mutating data_store operations with an audit event using a standard payload
      (user_id, action, model, record_id, before, after). This is more structured
      than the pattern-level approach and provides compile-time guarantees rather
      than relying on developers to manually add emit nodes.
    recommendation:
      action: ADD_FIELD
      pillar: cross_cutting
      scope: "Add `audit: boolean` to domain.yaml (applies to all flows in domain) and to flow metadata entry in domain.yaml flows[]. When true, /ddd-implement auto-generates audit event emission around each data_store create/update/delete node using standard AuditLog payload schema."
      affects:
        spec: true
        commands: true
        tool: false
        validator: false
      effort: medium
      risk: low
      breaking: false
    decision: approve

  - id: "EN-007"
    shortfall: "Add visible_when at wizard step level in FormSpec"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: medium
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      Form wizard specs have `steps[].fields` (static field lists per step) with no
      way to conditionally include or skip a step based on prior step answers. This is
      distinct from EN-005 in the nexus v1 plan (field_groups with visible_when within
