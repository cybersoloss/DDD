  - id: "EN-011"
    shortfall: "Add text_split node type for text chunking with configurable strategies"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus-e2e"]
      max_severity: medium
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      No existing node can split a text string into a variable-length array of chunks
      with configurable length limits and split strategies. The `transform` node maps
      fields but cannot produce variable-length arrays through iterative operations.
      `collection` operates on existing arrays. The tweet threading use case (split
      article into ≤280-char chunks with "1/N, 2/N" prefixes) is the triggering
      case, but text chunking is broadly useful: LLM context window management
      (chunk long documents for batch processing), paragraph extraction, and sentence
      splitting for NLP preprocessing. Single-project signal but high generalizability.
      Classified as ENHANCEMENT rather than REAL_GAP because the process node
      workaround, while free-text, is functional.
    recommendation:
      action: ADD_NODE_TYPE
      pillar: logic
      scope: "Add `text_split` node type with fields: input (field reference), max_length (int), split_strategy ('word'|'sentence'|'paragraph'|'character'), prefix_template (optional, e.g., '{{index}}/{{total}} '), suffix_template (optional), output (array field name). Has single output handle 'chunks'. /ddd-implement generates text chunking utility."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: medium
      risk: low
      breaking: false
    decision: approve

