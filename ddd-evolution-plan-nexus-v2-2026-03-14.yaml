# ──────────────────────────────────────────────
# TIER 3: Not actionable
# Shortfalls that don't warrant changes
# ──────────────────────────────────────────────
not_actionable:
  - id: "NA-001"
    shortfall: "data_store soft_delete as per-node flag (soft_delete: true on delete operations)"
    verdict: ALREADY_POSSIBLE
    reason: |
      soft_delete is a first-class cross_cutting_patterns type in architecture.yaml.
      The pattern type is documented (`soft_delete: deletedAt: null filters on all reads,
      cascade behavior`) and /ddd-implement applies it automatically to matching nodes.
      The architecture.yaml audit_log pattern shows how to configure this: set
      `operations: [create, update, delete]` and `used_by_domains: [...]` to target
      the domains that need soft delete. The canvas invisibility concern is addressed
      by EN-014 (pattern_governed badge on L3 nodes), which would show which nodes
      have the soft_delete pattern applied. Adding a separate per-node flag would
      create a parallel mechanism for the same behavior.
    decision: accept_verdict

  - id: "NA-002"
    shortfall: "batch operation_template as array for multi-step per-item pipelines"
    verdict: BY_DESIGN
    reason: |
      The batch node already provides `sub_flow_ref` as the intended mechanism for
      multi-step batch bodies. `operation_template` handles single-node batch bodies;
      when an item requires more than one step, the designer extracts those steps into
      a sub-flow. This indirection is intentional — it keeps the batch node focused on
      iteration control and delegates pipeline logic to composable sub-flows. Making
      operation_template an array would effectively embed a mini-flow inside a node spec,
      blurring the graph model. The spec comment "mutually exclusive with sub_flow_ref"
      signals this is a deliberate design choice.
    decision: accept_verdict

  - id: "NA-003"
    shortfall: "collection stream operation for lazy partial-result emission"
    verdict: PROJECT_SPECIFIC
    reason: |
      The streaming batch processing pattern (emit partial results before the full set
      is ready) is achievable with existing nodes: use a batch node to process items,
      with each item's sub-flow emitting an event node to progressively push results
      to a WebSocket via websocket_broadcast. This is the canonical DDD pattern for
      streaming results. A dedicated `stream` collection operation would duplicate
      this pattern without adding expressiveness. The use case (streaming LLM batch
      results) is specific to AI-processing workflows with real-time dashboards —
      it's a single-project signal and the existing workaround composes cleanly.
    decision: accept_verdict

  - id: "NA-004"
    shortfall: "connection condition range routing (returning route label instead of boolean)"
    verdict: ALREADY_POSSIBLE
    reason: |
      smart_router already handles range-based routing with full numeric condition
      support. Each rule has a `condition` field that evaluates to a route ID:
      `{ condition: "score > 80", route: "fast-track" }`,
      `{ condition: "score >= 50", route: "standard" }`,
      `{ condition: "score < 50", route: "reject" }`.
      For the score-based routing in editorial review and orchestrate-analysis, replace
      chained decision nodes with a single smart_router node. The smart_router is
      specifically designed for this multi-way conditional split use case. The shortfall
      misidentifies this as requiring a new connection feature when the correct tool
      is already available.
    decision: accept_verdict

  - id: "NA-005"
    shortfall: "circuit_break_config on connections instead of nodes (semantic placement)"
    verdict: ALREADY_POSSIBLE
    reason: |
      circuit_break_config IS already documented on connections, not nodes. The Usage
      Guide connection behavior section shows `behavior: circuit_break` with
      `circuit_break_config` as connection-level fields:
        connections:
          - targetNodeId: service-carrier-001
            behavior: circuit_break
            circuit_break_config:
              failure_threshold: 5
              recovery_timeout_ms: 30000
      The shortfall states "requires circuit_break_config at the node level, not the
      connection level" — this is factually incorrect based on the current spec.
      The shortfall may reflect an older version of the spec or a misreading of
      the documentation. No change needed.
    decision: accept_verdict

  - id: "NA-006"
    shortfall: "L1 real-time cost/token usage overlay per domain"
    verdict: BY_DESIGN
    reason: |
      The DDD Tool canvas is a design-time spec authoring tool, not a runtime
      monitoring dashboard. LLM cost and token usage are runtime metrics that require
      an active observability backend (Prometheus, Datadog, CloudWatch). Displaying
      runtime cost data on a design-time canvas conflates two different concerns.
      The correct place for cost monitoring is a runtime dashboard (Grafana, Langfuse).
      flow.metrics already declares what to measure (Prometheus counters for LLM calls);
      runtime cost aggregation belongs in the monitoring stack, not the spec canvas.
    decision: accept_verdict

  - id: "NA-007"
    shortfall: "L2 per-flow execution frequency hot/cold path visualization"
    verdict: BY_DESIGN
    reason: |
      Execution frequency is runtime data. The trigger type already communicates
      scheduling cadence in the spec: `type: cron` with an interval is visually
      distinct from `type: HTTP` (on-demand). The DDD Tool can (and does) display
      trigger type icons on flow blocks at L2. Runtime execution count heatmaps
      belong in an observability dashboard. Mixing design-time specs with runtime
      execution data on the same canvas would require a live backend connection
      and make the canvas dependent on deployment state.
    decision: accept_verdict

  - id: "NA-008"
    shortfall: "L3 node execution heatmap and agent context window visualization"
    verdict: BY_DESIGN
    reason: |
      Both L3 visualization requests are runtime observability concerns. Node execution
      heatmaps (p99 latency per node) require profiling data from a running system.
      Agent context window visualization (tokens consumed per iteration) is an
      agent runtime telemetry concern. Neither belongs on a design-time canvas.
      The appropriate tools are OpenTelemetry traces (for node-level latency) and
      Langfuse/Helicone (for LLM context tracking). The DDD Tool design-time canvas
      should remain spec-only — displaying runtime data would require backend
      connectivity and make the canvas state-dependent.
    decision: accept_verdict

  - id: "NA-009"
    shortfall: "service_call first-class retry configuration (separate from connection behavior:retry)"
    verdict: ALREADY_POSSIBLE
    reason: |
      service_call already has a `retry` field with full configuration:
      `retry: { max_attempts?, backoff_ms?, strategy?: 'fixed'|'linear'|'exponential', jitter?: boolean }`.
      This is documented in the Usage Guide service_call spec table. The shortfall
      states "retry must be expressed via connection behavior:retry which lacks
      backoff configuration" — this is not current: service_call has its own node-level
      retry with backoff strategy selection. The connection behavior:retry gap
      (EN-001) is a separate concern for non-retry-capable node types.
    decision: accept_verdict

  - id: "NA-010"
    shortfall: "filter-bar saved presets, repeating_group nesting, inline bulk-edit, feature_gate node, flow cost_budget"
    verdict: PROJECT_SPECIFIC
    reason: |
      Five low-severity shortfalls grouped as collectively low-priority single-project
      signals: (1) filter-bar presets — useful UX but adequately served by URL query
      param persistence; (2) repeating_group nesting — max_depth:2 nested groups are
      edge-case form complexity that custom_fields handles; (3) inline bulk-edit —
      opening items individually is an adequate workflow for current editorial scale;
      (4) feature_gate node — a service_call to a flag service + decision node already
      makes the conditional logic visible on the canvas; (5) flow cost_budget — cost
      management is a runtime operations concern, not a spec authoring concern.
      None of these have multi-project validation. All have adequate workarounds that
      preserve design intent.
    decision: accept_verdict

# ──────────────────────────────────────────────
# Execution order (for approved items only)
# ──────────────────────────────────────────────
recommended_order:
  - phase: 1
    ids: ["RG-001", "RG-002"]
    rationale: "High-severity AI orchestration gaps — top recommendation from shortfalls report. Small-medium effort, clear scope, directly enable the AI consensus review pattern that demonstrates DDD's agent capabilities."
  - phase: 2
    ids: ["RG-003", "EN-001", "EN-011"]
    rationale: "UI component gap (kanban-board) and spec field additions. EN-011 (text_split node) is a new node type best batched with the kanban-board spec changes. EN-001 (retry_config on connections) is small effort and can go alongside."
  - phase: 3
    ids: ["EN-002", "EN-003", "EN-004", "EN-012"]
    rationale: "Spec field additions with no tool changes — cors_config, schema_ref, async connection, handoff on_failure flow ref. Low-risk, small effort, purely spec+commands."
  - phase: 4
    ids: ["EN-005", "EN-006"]
    rationale: "Domain-level policy fields (rate_limit_policy, audit flag) — both require domain.yaml and system.yaml spec changes plus /ddd-implement behavior changes. Best done together as they share the domain-level metadata pattern."
  - phase: 5
    ids: ["EN-007", "EN-008", "EN-009", "EN-010", "EN-013"]
    rationale: "Interface spec improvements — wizard step visible_when, collaborative page presence, calendar-view component, item-list sections, chart multi-series. Grouping all interface changes reduces review overhead."
  - phase: 6
    ids: ["EN-014"]
    rationale: "DDD Tool canvas-only enhancements (L1 SLA badges, L2 memory_stores, L3 pattern_governed). Tool-only changes, no spec/command impact. Best done last as a focused DDD Tool sprint."
