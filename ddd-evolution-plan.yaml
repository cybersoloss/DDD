not_actionable:
  - id: "NA-001"
    shortfall: "Terminal node lacks redirect_url field for HTTP 302 redirects"
    verdict: BY_DESIGN
    reason: |
      Terminal already supports status: 302 with headers: { Location: url }. This IS
      the HTTP redirect pattern — not a workaround. A redirect_url field would be syntactic
      sugar that duplicates existing capability. The terminal's headers field is general-purpose
      by design, covering redirects, CORS, caching, and any other response header.
    decision: accept_verdict

  - id: "NA-002"
    shortfall: "Env var reads require process nodes (3 workarounds across settings flows)"
    verdict: BY_DESIGN
    deduped_from: 2
    reason: |
      The shortfall itself acknowledges: "Legitimate business_logic — env var reads are
      too runtime-specific for a structured node." process nodes are designed for exactly
      this — runtime introspection operations with no external I/O. Reading process.env
      is imperative code, not a declarative data operation.
    decision: accept_verdict

  - id: "NA-003"
    shortfall: "Redaction of sensitive values requires a process node"
    verdict: BY_DESIGN
    reason: |
      The shortfall self-acknowledges: "Legitimate business_logic — redaction logic is
      specific enough to warrant a process node." Selective field masking (****) while
      passing other fields through is custom business logic, not a crypto operation.
    decision: accept_verdict

  - id: "NA-004"
    shortfall: "Health checks (SELECT 1, Redis PING) require process nodes"
    verdict: BY_DESIGN
    deduped_from: 2
    reason: |
      Infrastructure health checks (SELECT 1, PING) are distinct from business data
      operations. Using data_store for health checks would conflate infrastructure
      monitoring with business logic. The shortfall self-acknowledges this: "accept as
      process node usage since health checks are infrastructure concerns."
    decision: accept_verdict

  - id: "NA-005"
    shortfall: "No UI component for transient action-result display (test connection results)"
    verdict: BY_DESIGN
    reason: |
      The existing button-group with form submit success/error config handles this
      pattern. FormSubmit has success: { message, redirect?, action? } and
      error: { message, retry? } which cover transient result display. For more complex
      results (latency numbers), a detail-card that conditionally renders after the
      action is the standard pattern. Adding an action_result component type would
      create overlap with existing patterns.
    decision: accept_verdict

