not_actionable:
  - id: "NA-001"
    source_id: "SHF-002"
    shortfall: "sub_flow cannot declare error propagation mode"
    verdict: ALREADY_POSSIBLE
    reason: |
      Connection behavior field (Section 5) already supports this. Wire the sub_flow's
      error connection with behavior: continue for log-and-skip, behavior: retry for
      retry-before-failing, or behavior: circuit_break for circuit breaker protection.
      Example: connections: [{ targetNodeId: terminal-err, sourceHandle: error,
      behavior: continue, label: "Best-effort — log and skip" }].
    decision: accept_verdict

  - id: "NA-002"
    source_id: "SHF-004"
    shortfall: "crypto node covers only encrypt/decrypt — no hash or HMAC"
    verdict: ALREADY_POSSIBLE
    reason: |
      crypto node (Section 6.2) now supports operation: hash with algorithm: sha256 | sha512
      | hmac-sha256. Example: spec: { operation: hash, algorithm: sha256,
      input_fields: ["raw_content"], output_field: "content_hash" }. Also supports
      generate_token and generate_key for token/key generation. This shortfall was written
      against DDD v0.2.x before crypto was expanded.
    decision: accept_verdict

  - id: "NA-003"
    source_id: "SHF-006"
    shortfall: "smart_router sourceHandle cannot use hyphenated values"
    verdict: ALREADY_POSSIBLE
    reason: |
      YAML supports quoted hyphenated strings. smart_router rules[].id values become
      sourceHandle values — "apple-notes" is valid YAML and valid as a sourceHandle.
      The DDD Tool normalizer handles quoted strings. No technical limitation exists.
      Example: rules: [{ id: "apple-notes", condition: "type === 'apple-notes'",
      route: "apple-notes" }] with connection sourceHandle: "apple-notes".
    decision: accept_verdict

  - id: "NA-004"
    source_id: "SHF-007"
    shortfall: "data_store aggregate operation not in DDD Usage Guide"
    verdict: ALREADY_POSSIBLE
    reason: |
      data_store (Section 6.2) now documents operation: aggregate with aggregate_fields
      (array of { function: count|sum|avg|min|max, field: string, alias: string }) and
      group_by: string[]. This was added after the shortfalls file was generated.
      Example: spec: { operation: aggregate, model: RawItem, group_by: ["source_type"],
      aggregate_fields: [{ function: count, alias: "total" },
      { function: sum, field: "word_count", alias: "total_words" }] }.
    decision: accept_verdict

  - id: "NA-005"
    source_id: "SHF-009"
    shortfall: "Loop node has no per-item error handling option"
    verdict: ALREADY_POSSIBLE
    reason: |
      Loop node (Section 6.2) has on_error: 'continue' | 'break' | 'fail' (default: 'fail').
      on_error: continue is exactly per-item error isolation — when an iteration fails, the
      loop logs the error and proceeds to the next item. This was present in the guide before
      this shortfall was filed — likely overlooked during spec authoring.
    decision: accept_verdict

  - id: "NA-006"
    source_id: "SHF-005"
    shortfall: "BullMQ repeatable job registration not expressible in event node"
    verdict: PROJECT_SPECIFIC
    reason: |
      Dynamic runtime job registration (addBulk with repeat config, remove_on_complete/fail)
      is a BullMQ-specific imperative operation, not a declarative spec concern. DDD specs
      describe WHAT should happen, not runtime queue management APIs. Static cron schedules
      are covered by cron triggers with job_config (queue, concurrency, retry, dead_letter,
      dedup_key, lock_ttl_ms, priority). The gap is specifically about programmatic BullMQ
      administration — a process node with clear description is the right fit here, not a
      structured node type.
    decision: accept_verdict

