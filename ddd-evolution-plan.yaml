enhancements:
  - id: "EN-001"
    source_id: "SHF-001"
    shortfall: "Extend ipc_call for subprocess execution (working_dir, capture, exit handling)"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["GTDCOLLECTOR"]
      max_severity: major
      specificity: specific
      workaround_quality: lossy_workaround
    analysis: |
      ipc_call (Section 6.2) already has command, args, timeout_ms, bridge, return_type,
      and result_condition — covering ~70% of the subprocess use case. But it's framed as
      IPC (Tauri/Electron), not OS subprocess execution. Missing fields: working_dir for
      cwd control, capture mode (stdout/stderr/both) for pipe management, and explicit
      non-zero exit semantics beyond result_condition. The workaround (process node with
      free-text) loses all subprocess configuration expressiveness. Extending ipc_call is
      lower cost than a new node type and preserves the existing sourceHandle contract.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add working_dir, capture, and on_nonzero_exit fields to ipc_call node spec. Update ipc_call description to explicitly include OS subprocess execution alongside IPC."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-002"
    source_id: "SHF-003"
    shortfall: "SSE connection lifecycle fields on sse trigger (heartbeat, resume, disconnect)"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["GTDCOLLECTOR"]
      max_severity: moderate
      specificity: specific
      workaround_quality: lossy_workaround
    analysis: |
      SSE trigger (event: "sse /api/updates") and terminal response_type: sse already exist.
      The WebSocket trigger has connection_config (auth, heartbeat_ms, max_connections, reconnect)
      — but the SSE trigger has no equivalent. SSE has distinct lifecycle needs: heartbeat interval
      to keep connections alive, Last-Event-ID header for resume-after-disconnect, and cleanup
      on client disconnect. Adding a connection_config to SSE triggers (parallel to ws triggers)
      would close this gap without a new node type. The event node workaround (transport: SSE
      with non-standard fields) works but canvas ignores the extra fields.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add connection_config to SSE triggers (heartbeat_ms, resume_header, on_disconnect) — parallel to ws trigger connection_config."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-003"
    source_id: "SHF-008"
    shortfall: "Add select/project field to data_store for column projection"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["GTDCOLLECTOR"]
      max_severity: minor
      specificity: specific
      workaround_quality: lossy_workaround
    analysis: |
      data_store has query (filters), include (joins), pagination, sort, filters (conditionals),
      aggregate_fields, group_by — but no column projection. Without select, every read fetches
      all columns including large BLOBs (raw_content). The workaround is a read + transform node,
      but that still fetches the full record from the database — the performance cost is real for
      list views with hundreds of records containing large text fields. Column projection is a
      fundamental database operation that every ORM supports (Prisma select, SQL SELECT).
      Adding a select field is additive and non-breaking.
    recommendation:
      action: ADD_FIELD
      pillar: data
      scope: "Add select field to data_store spec: select: string[] | Record<string, string> — list of field names to return, or alias-to-expression map for computed columns."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-004"
    source_id: "SHF-010"
    shortfall: "Document startup/lifecycle trigger convention"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["GTDCOLLECTOR"]
      max_severity: moderate
      specificity: moderate
      workaround_quality: adequate_workaround
    analysis: |
      The trigger convention list (Section 6.1) covers HTTP, cron, event:, manual, webhook,
      sse, ws, pattern:, shortcut, timer, ui:, ipc: — but not application lifecycle events
      (startup, shutdown, ready). BullMQ worker triggers are covered by event triggers with
      job_config. The gap is narrow: just adding "lifecycle:{event}" or "app:{event}" as a
      documented convention. The workaround (informal event strings like "application:startup")
      is adequate — canvas renders them fine, implementers understand the intent.
    recommendation:
      action: UPDATE_SPEC
      pillar: logic
      scope: "Add lifecycle trigger convention to Section 6.1: lifecycle:{event} for app startup/shutdown/ready. Add example to trigger conventions list."
      affects:
        spec: true
        commands: false
        tool: false
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

# ──────────────────────────────────────────────
# TIER 3: Not actionable
# Shortfalls that don't warrant changes
