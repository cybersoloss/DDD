enhancements:
  - id: "EN-001"
    shortfall: "BullMQ queue introspection — no node for reading queue depths, querying job state, or removing repeatable jobs"
    verdict: ENHANCEMENT
    deduped_from: 6
    evidence:
      frequency: 1
      projects: ["gtdcollector"]
      max_severity: medium
      specificity: specific
      workaround_quality: lossy_workaround
      affected_flows:
        - "scheduler/get-queue-status (2 process nodes)"
        - "monitor/get-activity-feed (1 process node)"
        - "scheduler/update-schedule (2 process nodes)"
        - "scheduler/register-cron-jobs"
    analysis: |
      The event node handles queue enqueue (target_queue + addRepeatable) but has no
      read or remove operations. Five process nodes across 3 flows are forced workarounds
      for queue introspection: reading depths (waiting/active/delayed/completed/failed),
      querying per-connector job state, querying job history, and removing repeatable
      jobs. This is the strongest single-project signal in this report — same root cause,
      6 workarounds. The shortfall self-identifies this as the top recommendation.

      Two approaches: (a) extend event node with queue_operation field (read_metrics,
      get_jobs, remove), or (b) new queue node type. Option (a) keeps the 30-node count
      stable but stretches the event node's purpose. Option (b) is cleaner but adds a
      31st node type. Recommend deferring until a second project reports this pattern.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Extend event node with queue_operation: read_metrics | get_jobs | remove_repeatable, or introduce a queue node type. Needs second project signal before committing."
      affects:
        spec: true
        commands: true
        tool: true
        validator: true
      effort: medium
      risk: medium
      breaking: false
    decision: approve

  - id: "EN-002"
    shortfall: "SSE trigger cannot express which internal events feed the stream (event_subscriptions)"
    verdict: ENHANCEMENT
    deduped_from: 2
    evidence:
      frequency: 1
      projects: ["gtdcollector"]
      max_severity: medium
      specificity: specific
      workaround_quality: lossy_workaround
      affected_flows:
        - "monitor/stream-live-events"
    analysis: |
      The SSE trigger (with connection_config added in the previous evolution) opens
      the streaming connection but cannot express which internal events (SyncCompleted,
      SyncFailed, ConnectorStatusChanged) should be forwarded over the SSE stream.
      A process node is required to set up event bus subscriptions. Adding an
      event_subscriptions field to the SSE trigger would make the event-to-stream
      mapping declarative and visible on the canvas.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add event_subscriptions: string[] to SSE trigger spec — list of internal event names that feed into the SSE stream. /ddd-implement generates event bus subscription + SSE forwarding."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-003"
    shortfall: "ipc_call lacks output_format field for auto-parsing subprocess stdout"
    verdict: ENHANCEMENT
    deduped_from: 1
    evidence:
      frequency: 1
      projects: ["gtdcollector"]
      max_severity: low
      specificity: specific
      workaround_quality: adequate_workaround
      affected_flows:
        - "connectors/sync-apple-notes"
        - "connectors/sync-safari"
    analysis: |
      ipc_call with bridge: shell captures subprocess stdout, but parsing the output
      (JXA JSON, Python plistlib dict) requires a separate parse or transform node.
      An output_format field (json, plist, csv, lines) would auto-parse before passing
      to the next node, eliminating one node per subprocess call. The workaround (two-node
      pattern: ipc_call → parse) is functional and maintains separation of concerns.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add output_format: 'json' | 'plist' | 'csv' | 'lines' | 'raw' to ipc_call spec. Default: 'raw' (current behavior). When set, auto-parse stdout before passing to next node."
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

