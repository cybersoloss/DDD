not_actionable:
  - id: "NA-001"
    shortfall: "agent_loop tool has both terminal: true and is_terminal: true — two fields for the same concept"
    verdict: ALREADY_POSSIBLE
    reason: |
      The canonical field is `is_terminal: true` — this is the only name
      documented in the DDD Usage Guide (Section 6: agent_loop tool fields,
      Section 8: agent flow validation rule, Section 13: agent flow checklist).
      The field `terminal: true` does not appear anywhere in the spec documentation
      and is not recognized by the DDD Tool validator (flow-validator.ts only
      checks `t.is_terminal`). The shortfall arose from using the wrong field
      name (`terminal`) and then discovering the validator requires `is_terminal`.
      The fix is to use only `is_terminal: true` — there is no ambiguity in the
      spec, just a naming guess that didn't match. No framework change needed.
      If this confusion recurs, a normalizer alias (terminal → is_terminal) could
      be added to flow-normalizer.ts, but that's a tooling convenience, not a
      spec gap.
    decision: accept_verdict

  - id: "NA-002"
    shortfall: "collection node lacks score-and-rank operation with custom multi-factor scoring"
    verdict: BY_DESIGN
    reason: |
      The requested operation — score each item by keyword overlap across multiple
      fields with per-field weighting, then filter by threshold and take top N —
      is custom business logic that varies significantly between projects. The
      collection node's 11 operations (filter, sort, deduplicate, merge, group_by,
      aggregate, reduce, flatten, first, last, join) are intentionally generic
      composable primitives. Custom scoring can be expressed two ways:
      (1) A `reduce` node to compute scores per item into a new array, followed
      by `sort` (by score, desc) and `first(3)` — three nodes, fully spec-visible.
      (2) A `process` node with category: business_logic — appropriate because
      the scoring formula (keyword extraction, field weighting, threshold) IS the
      business logic and should be readable in code, not compressed into a spec
      field.
      Adding `rank` or `score_match` as collection operations would encode
      project-specific scoring semantics into a generic primitive, violating the
      design principle that collection operations are data-structure transforms,
      not domain-logic evaluators.
    decision: accept_verdict

