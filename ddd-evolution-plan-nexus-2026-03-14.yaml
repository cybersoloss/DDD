enhancements:
  - id: "EN-001"
    shortfall: "Add jwt_sign and jwt_verify operations to the crypto node"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus"]
      max_severity: medium
      specificity: specific
      workaround_quality: lossy_workaround
      consistent_severity: true
    analysis: |
      JWT is the most common auth mechanism in web apps. The crypto node
      has generic sign/verify but cannot encode JWT claims (header +
      payload + signature). Currently requires a process node with
      category: security, which loses spec-driven type safety. This is
      the top recommendation in the shortfall report itself. Classified
      as ENHANCEMENT rather than REAL_GAP because it's a single-project
      signal — if content-curator or Publio also report this, promote
      to REAL_GAP immediately.
    recommendation:
      action: ADD_FIELD
      pillar: logic
      scope: "Add operations jwt_sign and jwt_verify to crypto node with fields: payload, secret_env (or key_source), algorithm (HS256/RS256/ES256), expires_in"
      affects:
        spec: true
        commands: true
        tool: true
        validator: true
      effort: medium
      risk: low
      breaking: false
    decision: approve

  - id: "EN-002"
    shortfall: "Allow cross_cutting_patterns to reference trigger fields (rate_limit, auth)"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus"]
      max_severity: medium
      specificity: specific
      workaround_quality: lossy_workaround
      consistent_severity: true
    analysis: |
      Cross-cutting patterns currently target node specs only. Rate
      limiting must be duplicated on every HTTP trigger individually.
      A pattern like { applies_to: "trigger", trigger_type: "HTTP",
      fields: { rate_limit: {...} } } would eliminate this duplication.
      The workaround (per-trigger rate_limit) is functional but verbose
      and error-prone on large projects (71 flows in nexus).
    recommendation:
      action: ADD_FIELD
      pillar: cross_cutting
      scope: "Extend cross_cutting_patterns schema to support applies_to: trigger with trigger_type filter and trigger-level field injection"
      affects:
        spec: true
        commands: true
        tool: false
        validator: false
      effort: medium
      risk: low
      breaking: false
    decision: approve

  - id: "EN-003"
    shortfall: "Add audit_log pattern type in cross_cutting_patterns for automatic audit trail"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus"]
      max_severity: low
      specificity: moderate
      workaround_quality: lossy_workaround
      consistent_severity: true
    analysis: |
      Audit logging is a classic cross-cutting concern that currently
      requires manually adding data_store create AuditLog nodes to
      every mutating flow. A cross_cutting_pattern with type: audit_log
      could auto-generate audit entries for specified operations. The
      specificity is moderate — the shortfall doesn't detail the audit
      entry schema or which operations should be audited. Would benefit
      from further refinement before implementation.
    recommendation:
      action: ADD_FIELD
      pillar: cross_cutting
      scope: "Add audit_log pattern type to cross_cutting_patterns with operation filter and audit entry schema"
      affects:
        spec: true
        commands: true
        tool: false
        validator: false
      effort: medium
      risk: low
      breaking: false
    decision: approve

  - id: "EN-004"
    shortfall: "Add pagination_response field to data_store for auto-formatting cursor pagination responses"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus"]
      max_severity: low
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      data_store.pagination defines request-side pagination config
      (style, default_limit, max_limit) but not the response envelope.
      The cursor pagination response (data, cursor, has_more) must be
      assembled manually using a transform node. This is adequate —
      the transform node preserves all information — but adds a node
      to every paginated flow. A pagination_response field would
      eliminate the transform step for a very common pattern.
    recommendation:
      action: ADD_FIELD
      pillar: data
      scope: "Add pagination_response: { data_field, cursor_field, has_more_field } to data_store node spec for cursor pagination"
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

  - id: "EN-005"
    shortfall: "Add field_groups with group-level visible_when to form spec"
    verdict: ENHANCEMENT
    evidence:
      frequency: 1
      projects: ["nexus"]
      max_severity: low
      specificity: specific
      workaround_quality: adequate_workaround
      consistent_severity: true
    analysis: |
      Form specs support per-field visible_when but not group-level
      visibility. When a form has 5+ fields that should show/hide as
      a group (e.g., credentials section based on source type), each
      field needs its own visible_when with the same condition — verbose
      but functional. A field_groups construct with group-level
      visible_when would reduce repetition and make the form intent
      clearer in the spec.
    recommendation:
      action: ADD_FIELD
      pillar: interface
      scope: "Add field_groups: [{ id, label, visible_when, fields }] to FormSpec"
      affects:
        spec: true
        commands: true
        tool: true
        validator: false
      effort: small
      risk: low
      breaking: false
    decision: approve

# ──────────────────────────────────────────────
# TIER 3: Not actionable
# Shortfalls that don't warrant changes
# ──────────────────────────────────────────────
not_actionable:
  - id: "NA-001"
    shortfall: "smart_router requires static rules — needs dynamic event-type routing"
    verdict: ALREADY_POSSIBLE
    reason: |
      smart_router already evaluates conditions dynamically with
      confidence scoring. Each rule has a `condition` field that
      can match event metadata (e.g., condition: "$.event_type ===
      'ContentCreated'"). The shortfall mischaracterizes smart_router
      as static-rules-only — it is dynamic by design.
    decision: accept_verdict

  - id: "NA-002"
    shortfall: "No interval_push or stream_emit node for periodic server push within a WS connection"
    verdict: ALREADY_POSSIBLE
    reason: |
      The DDD architecture already supports this pattern: use a
      timer trigger (e.g., "timer 10000") to fire periodically,
      then a websocket_broadcast node to push to connected clients.
      This is the canonical DDD pattern for periodic server push.
      No new node type is needed.
    decision: accept_verdict

  - id: "NA-003"
    shortfall: "Need provider-aware transform mode or webhook_normalize node"
    verdict: ALREADY_POSSIBLE
    reason: |
      Webhook payload normalization is achievable with existing nodes:
      use a decision node or smart_router to branch by provider
      ($.headers['x-webhook-source']), then a transform node per
      branch with provider-specific field_mappings. This preserves
      full spec visibility of the normalization logic.
    decision: accept_verdict

  - id: "NA-004"
    shortfall: "Pattern triggers need window_ms for time-windowed aggregation"
    verdict: ALREADY_POSSIBLE
    reason: |
      Pattern triggers already have a `window` field that accepts
      duration strings (e.g., "7d", "1h", "30m"). The shortfall
      requests window_ms but the existing field serves the same
      purpose with a more human-readable format. No change needed.
    decision: accept_verdict

  - id: "NA-005"
    shortfall: "Add skip_when condition on nodes for conditional node bypass"
    verdict: BY_DESIGN
    reason: |
      connection.condition already achieves conditional bypass:
      when the condition is false, the edge is skipped and the
      target node is not executed. Adding skip_when on nodes would
      create a parallel mechanism for the same behavior, violating
      the principle that graph structure (edges) controls flow, not
      node-level attributes. The connection-based model composes
      cleanly with the existing graph traversal engine.
    decision: accept_verdict

  - id: "NA-006"
    shortfall: "Flow execution metrics not representable as visual elements on the canvas"
    verdict: BY_DESIGN
    reason: |
      The DDD Tool canvas is a design-time tool for spec authoring,
      not a runtime monitoring dashboard. flow.metrics declares what
      to measure (Prometheus counters/gauges/histograms), and
      /ddd-scaffold generates metric registration stubs. Actual metric
      visualization belongs in Grafana/Datadog, not the spec canvas.
      Mixing design-time and runtime concerns would add complexity
      without improving the spec authoring experience.
    decision: accept_verdict

  - id: "NA-007"
    shortfall: "chat-interface needs message_features (reactions, threads, attachments)"
    verdict: PROJECT_SPECIFIC
    reason: |
      The chat-interface component is designed for AI/LLM conversation
      UIs (streaming token output), not full messaging platforms.
      Reactions, threads, and attachments are specific to collaborative
      messaging apps. For nexus, custom_fields can express these
      features. A full messaging component type would be a separate
      proposal if multiple projects need it.
    decision: accept_verdict

